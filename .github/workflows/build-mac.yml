name: build-mac

# 手動觸發:在 macos-14 (Apple Silicon) 上自編 SDL2 + ScummVM(AGOS)universal .app
# 產出 .dmg / .tar.gz artifact(不含遊戲資料,私用版本機注入)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging tools
        run: brew install dylibbundler

      - name: Build universal .app (self-built SDL2, no sdl2-compat)
        run: bash scripts/ci_mac_build.sh

      - name: Verify SDL2 is real (not SDL3 shim) & universal
        run: |
          APP=dist-mac/SimonScummVM-CHT.app
          echo "== binary archs =="; lipo -info "$APP/Contents/MacOS/scummvm"
          echo "== SDL2 archs ==";   lipo -info "$APP/Contents/Frameworks/libSDL2-2.0.0.dylib"
          echo "== linkage =="; otool -L "$APP/Contents/MacOS/scummvm" | grep -i sdl
          if otool -L "$APP/Contents/Frameworks/libSDL2-2.0.0.dylib" | grep -qi SDL3; then
            echo "FATAL: sdl2-compat shim detected"; exit 1; fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SimonScummVM-CHT-mac
          path: |
            dist-mac/SimonScummVM-CHT-mac.dmg
            dist-mac/SimonScummVM-CHT-mac.tar.gz
          if-no-files-found: error
